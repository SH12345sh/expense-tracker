<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Income</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<!-- Paste this right at the bottom of index.html to make it support the theme tracking framework! -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        if (localStorage.getItem('app-theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    });
</script>

<body>

<div class="navbar">
    <a href="/">Dashboard</a>
    <a href="/add">Add Expense</a>
    <a href="/history">History</a>
    <a href="/income">Income</a>
    <a href="/reports">Reports</a>
    
    <a href="/logout" style="margin-left: auto; color: #ef4444;">Logout ({{ session['username'] }})</a>
</div>

<div class="dashboard-container">
    <h1 class="page-title">Edit Income</h1>

    <div class="table-section" style="max-width: 600px; margin: 0 auto;">
        <form method="POST">
            <div class="form-group">
                <label>Amount</label>
                <input type="number" step="0.01" name="amount" value="{{ income[2] }}" required class="form-control">
            </div>

            <div class="form-group">
                <label>Source</label>
                <input type="text" name="source" value="{{ income[3] }}" required class="form-control">
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" value="{{ income[4] }}" required class="form-control">
            </div>

            <button type="submit" class="btn-submit">Update Income</button>
        </form>
    </div>
</div>

{% include 'footer.html' %}

</body>
</html>
