<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to ExpenseTracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<!-- Paste this right at the bottom of index.html to make it support the theme tracking framework! -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        if (localStorage.getItem('app-theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    });
</script>

<body style="background-color: #f8f9fa;">

<div class="navbar" style="justify-content: space-between; align-items: center;">
    <a href="/" class="active" style="font-weight: 700; font-size: 20px;">💰 ExpenseTracker</a>
    <div style="display: flex; gap: 20px;">
        <a href="/login">Sign In</a>
        <a href="/signup" style="background-color: #3b82f6; color: white; padding: 6px 16px; border-radius: 6px;">Get Started</a>
    </div>
</div>

<div class="dashboard-container" style="text-align: center; margin-top: 100px; max-width: 800px;">
    <h1 style="font-size: 48px; color: #0f172a; margin-bottom: 20px; font-weight: 800; line-height: 1.2;">
        Take Control of Your <span style="color: #3b82f6;">Personal Finances</span> Simply.
    </h1>
    <p style="color: #64748b; font-size: 18px; margin-bottom: 40px; line-height: 1.6;">
        Track tracking your lifetime metrics, monitor dynamic savings rates, and build beautiful analytical performance insights effortlessly.
    </p>
    <div style="display: flex; gap: 20px; justify-content: center;">
        <a href="/signup" class="btn-submit" style="text-decoration: none; padding: 14px 32px; font-size: 16px;">Create Free Account</a>
        <a href="/login" class="btn-submit" style="text-decoration: none; padding: 14px 32px; font-size: 16px; background-color: #64748b;">Sign In</a>
    </div>
</div>

{% include 'footer.html' %}

</body>
</html>
